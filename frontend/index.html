<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">
  <title>Login — Task Manager</title>
  <style>
    :root{
      --bg:#020617;
      --primary:#2563eb;
      --accent:#a855f7;
      --card:#020617;
      --muted:#9ca3af;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{
      min-height:100vh;
      background:radial-gradient(circle at top,#1d283a 0,var(--bg) 55%);
      color:#e5e7eb;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
    }
    .shell{
      width:100%;
      max-width:960px;
      display:grid;
      grid-template-columns: minmax(0,1.2fr) minmax(0,1fr);
      gap:24px;
      background:rgba(15,23,42,0.96);
      border-radius:24px;
      box-shadow:0 30px 70px rgba(15,23,42,0.9);
      overflow:hidden;
      border:1px solid rgba(148,163,184,0.35);
    }
    .left{
      padding:30px 32px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      border-right:1px solid rgba(148,163,184,0.25);
      background:radial-gradient(circle at top left,rgba(37,99,235,0.28),transparent 55%);
    }
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
    .logo{
      width:36px;height:36px;border-radius:14px;
      background:conic-gradient(from 160deg,var(--primary),var(--accent),#22c55e,var(--primary));
      display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:18px;
    }
    .brand-text{font-weight:600;font-size:18px;}
    .subtitle{font-size:13px;color:var(--muted);margin-top:4px;}
    .hero-text{margin-top:36px;}
    .hero-text h1{font-size:26px;margin-bottom:8px;}
    .hero-pill{
      display:inline-flex;align-items:center;gap:6px;
      padding:4px 10px;border-radius:999px;
      background:rgba(15,23,42,0.85);
      border:1px solid rgba(148,163,184,0.35);
      font-size:11px;color:var(--muted);margin-top:10px;
    }
    .hero-metrics{display:flex;gap:20px;margin-top:26px;font-size:12px;color:var(--muted);}
    .metric strong{display:block;font-size:18px;color:#e5e7eb;}
    .right{padding:30px 32px;display:flex;flex-direction:column;justify-content:center;}
    .form-title{font-size:20px;font-weight:600;margin-bottom:6px;}
    .form-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
    .field{margin-bottom:14px;}
    label{display:block;font-size:13px;margin-bottom:4px;color:#e5e7eb;}
    input{
      width:100%;padding:9px 11px;border-radius:10px;
      border:1px solid rgba(148,163,184,0.6);
      background:#020617;color:#e5e7eb;font-size:13px;outline:none;
      transition:border-color .15s, box-shadow .15s, background .15s;
    }
    input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 1px rgba(37,99,235,0.45);
      background:#020617;
    }
    .btn{
      width:100%;padding:10px 12px;border-radius:999px;border:none;
      background:linear-gradient(135deg,var(--primary),var(--accent));
      color:white;font-weight:600;font-size:14px;cursor:pointer;margin-top:4px;
      box-shadow:0 12px 30px rgba(37,99,235,0.5);
      transition:transform .12s, box-shadow .12s, filter .12s;
    }
    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
      box-shadow:0 18px 40px rgba(37,99,235,0.7);
    }
    .muted-sm{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;}
    .muted-sm a{color:#60a5fa;text-decoration:none;}
    .muted-sm a:hover{text-decoration:underline;}
    .error{margin-top:8px;color:#fca5a5;font-size:12px;min-height:14px;}
    @media (max-width:800px){
      .shell{grid-template-columns:1fr;}
      .left{display:none;}
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="left">
    <div>
      <div class="brand">
        <div class="logo">TM</div>
        <div>
          <div class="brand-text">Task Manager</div>
          <div class="subtitle">Admin & team workspace</div>
        </div>
      </div>

      <div class="hero-text">
        <h1>Welcome back 👋</h1>
        <div class="subtitle">
          Login to manage tasks, track status, and keep your team in sync.
        </div>
        <div class="hero-pill">
          <span style="width:7px;height:7px;border-radius:50%;background:#22c55e;"></span>
          Local instance · localhost
        </div>
      </div>
    </div>

    <div class="hero-metrics">
      <div class="metric">
        <strong>3</strong>
        Active users
      </div>
      <div class="metric">
        <strong>∞</strong>
        Tasks
      </div>
    </div>
  </div>

  <div class="right">
    <div class="form-title">Login</div>
    <div class="form-sub">Use your registered email and password.</div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>

    <button class="btn" onclick="loginUser()">Continue</button>
    <div id="error" class="error"></div>

    <div class="muted-sm">
      New here? <a href="register.html">Create an account</a>
    </div>
  </div>
</div>

<script>
async function loginUser() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errEl = document.getElementById("error");
  errEl.innerText = "";

  if (!email || !password) {
    errEl.innerText = "Please fill in both fields.";
    return;
  }

  try {
    const res = await fetch("https://https-render-com-cu6h.onrender.com/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errEl.innerText = data.message || "Login failed.";
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("role", data.role);

    if (data.role === "admin") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "task.html";
    }
  } catch (e) {
    console.error(e);
    errEl.innerText = "Server error. Try again.";
  }
}
</script>
</body>
</html>
